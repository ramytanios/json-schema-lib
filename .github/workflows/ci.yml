name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: Check formatting
        run: sbt scalafmtCheck

      - name: Check scalafix
        run: sbt "scalafixAll --check"

      - name: Compile
        run: sbt compile

      - name: Test
        run: sbt test
